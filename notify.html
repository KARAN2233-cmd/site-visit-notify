<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enable Site Visit Reminders</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Google Sans', Roboto, Arial, sans-serif;
    background: #e9e3f5;
    color: #202124;
    padding: 16px;
  }
  .card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px rgba(60,64,67,0.15);
    max-width: 420px;
    width: 100%;
    padding: 28px 24px;
    text-align: center;
  }
  h1 { font-size: 20px; margin: 0 0 8px; }
  p { font-size: 14px; color: #5f6368; margin: 0 0 20px; line-height: 1.5; }
  .btn {
    background: #673ab7;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 11px 24px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn:hover { background: #5a32a3; }
  .btn:disabled { background: #b5a4d6; cursor: not-allowed; }
  #status { margin-top: 16px; font-size: 14px; min-height: 20px; }
</style>
</head>
<body>

  <div class="card">
    <h1>🔔 Site Visit Reminders</h1>
    <p>Tap the button below once to enable daily reminders on this device. You only need to do this one time per device/browser.</p>
    <button id="enableBtn" class="btn">Enable Reminders</button>
    <div id="status"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

  <script>
    // ⚠️ Must be IDENTICAL to the config in firebase-messaging-sw.js
    const firebaseConfig = {
      apiKey: "AIzaSyDhd9b-GT3gIA_5t8_mdtptVhmFnjFxf8g",
      authDomain: "site-visit-web.firebaseapp.com",
      projectId: "site-visit-web",
      storageBucket: "site-visit-web.firebasestorage.app",
      messagingSenderId: "385253553737",
      appId: "1:385253553737:web:9f08602c89614eaa9e3198"
    };

    // ⚠️ From Firebase Console → Project Settings → Cloud Messaging → Web Push certificates
    const VAPID_KEY = "BNGeLFTxJqxH7Mjkeigq7fsis31WNpY6Rlc03Xvnvzw4QjbOxXn75m1vtm2ROSEr8wn7Crw6bMPeFVdISCDSUzk";

    // ⚠️ Your Apps Script Web App URL (the same one deployed for the Site Visit form)
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2V-QWF5xrhztYV7iGVupAiVRs_dPBxAnmrnkiXnqCdFiMWRn08-mDqx44AmLlE74Y/exec";

    const btn = document.getElementById('enableBtn');
    const statusEl = document.getElementById('status');

    function callBackend(action, extra) {
      const body = Object.assign({ action: action }, extra);
      return fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      }).then(function (res) { return res.json(); });
    }

    btn.addEventListener('click', async function () {
      try {
        if (!('serviceWorker' in navigator) || !('Notification' in window)) {
          statusEl.textContent = 'Notifications are not supported in this browser.';
          return;
        }
        btn.disabled = true;
        statusEl.textContent = 'Requesting permission...';

        const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');

        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          statusEl.textContent = 'Permission denied. You will not get reminders.';
          btn.disabled = false;
          return;
        }

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();
        const token = await messaging.getToken({
          vapidKey: VAPID_KEY,
          serviceWorkerRegistration: registration
        });

        if (!token) {
          statusEl.textContent = 'Could not get a notification token. Please try again.';
          btn.disabled = false;
          return;
        }

        const result = await callBackend('saveToken', { token: token });
        if (result && result.success) {
          statusEl.textContent = '✅ Reminders enabled on this device.';
          btn.textContent = '🔔 Reminders Enabled';
        } else {
          statusEl.textContent = 'Token generated but could not be saved. Please try again.';
          btn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Could not enable notifications: ' + err.message;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
