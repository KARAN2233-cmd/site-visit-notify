<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Enable Site Visit Notifications</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#ede7f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:380px;
    max-width:90%;
    background:#fff;
    border-radius:8px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    padding:30px;
    text-align:center;
}

button{
    background:#673ab7;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:disabled{
    opacity:.7;
}

#status{
    margin-top:20px;
    color:#444;
    word-break:break-word;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

</head>

<body>

<div class="card">

<h2>🔔 Daily Reminder</h2>

<p>
Enable notifications on this device.
</p>

<button id="enableBtn">

Enable Notifications

</button>

<div id="status"></div>

</div>

<script>

const firebaseConfig={

apiKey:"AIzaSyDhd9b-GT3gIA_5t8_mdtptVhmFnjFxf8g",

authDomain:"site-visit-web.firebaseapp.com",

projectId:"site-visit-web",

storageBucket:"site-visit-web.firebasestorage.app",

messagingSenderId:"385253553737",

appId:"1:385253553737:web:9f08602c89614eaa9e3198"

};

const vapidKey="BNGeLFTxJqxH7Mjkeigq7fsis31WNpY6Rlc03Xvnvzw4QjbOxXn75m1vtm2ROSEr8wn7Crw6bMPeFVdISCDSUzk";

const appsScriptUrl="https://script.google.com/macros/s/AKfycbzcfmuQ8u9Upc8O4Kb1UXcmd2OaAJY8ihtvdxTMG_u0BlAQa4QCX_jAeIssfTApJxtz/exec";

firebase.initializeApp(firebaseConfig);

const messaging=firebase.messaging();

const btn=document.getElementById("enableBtn");

const status=document.getElementById("status");

btn.onclick=async()=>{

try{

btn.disabled=true;

status.innerHTML="Requesting permission...";

const permission=await Notification.requestPermission();

if(permission!=="granted"){

status.innerHTML="Permission denied.";

btn.disabled=false;

return;

}

const registration=await navigator.serviceWorker.register("firebase-messaging-sw.js");

const token=await messaging.getToken({

vapidKey:vapidKey,

serviceWorkerRegistration:registration

});

status.innerHTML="Saving token...";

const response=await fetch(appsScriptUrl,{

method:"POST",

redirect:"follow",

headers:{

"Content-Type":"text/plain"

},

body:JSON.stringify({

action:"saveToken",

token:token

})

});

const result=await response.json();

console.log(result);

if(result.success){

status.innerHTML="✅ Notifications enabled successfully.";

}else{

status.innerHTML=result.error;

btn.disabled=false;

}

}catch(err){

console.error(err);

status.innerHTML=err;

btn.disabled=false;

}

};

</script>

</body>
</html>
