- name: Fetch device tokens
  id: get_tokens
  run: |
    RESPONSE=$(curl --location \
      --request POST \
      "${{ secrets.GAS_APPS_SCRIPT_URL }}" \
      --header "Content-Type: application/json" \
      --data '{"action":"listTokens"}')

    echo "Response:"
    echo "$RESPONSE"

    python3 -c "import json,sys;print(json.loads(sys.stdin.read()))" <<< "$RESPONSE"

    {
      echo "tokens_json<<EOF"
      echo "$RESPONSE"
      echo "EOF"
    } >> "$GITHUB_OUTPUT"
