name: Site Visit Reminder

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Send Reminder
        run: |
          curl -X POST "${{ secrets.NOTIFY_ENDPOINT }}"
