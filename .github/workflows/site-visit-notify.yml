name: Site Visit Reminder

on:
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch device tokens
        id: get_tokens
        run: |
          RESPONSE=$(curl --silent --show-error --location \
            --request POST \
            "${{ secrets.GAS_APPS_SCRIPT_URL }}" \
            --header "Content-Type: application/json" \
            --data '{"action":"listTokens"}')

          echo "Response:"
          echo "$RESPONSE"

          echo "tokens_json<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate JSON
        run: |
          python3 -c "import json,os; json.loads(os.environ['TOKENS'])"
        env:
          TOKENS: ${{ steps.get_tokens.outputs.tokens_json }}
